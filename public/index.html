<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>FuelBunk Pro</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#0f1117"/>
<!-- Sprint 1: Chart.js, jsPDF, SheetJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1f2e;--surface2:#232838;--border:#2d3348;--accent:#f97316;--accent2:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--text:#f1f5f9;--muted:#94a3b8;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}
/* AUTH */
#authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0f1117 0%,#1a1f2e 100%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:440px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo .icon{font-size:48px;margin-bottom:8px}
.auth-logo h1{font-size:24px;font-weight:700;color:var(--accent)}
.auth-logo p{color:var(--muted);font-size:13px;margin-top:4px}
.tab-bar{display:flex;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:28px;gap:4px}
.tab-btn{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s}
.tab-btn.active{background:var(--accent);color:#fff}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:.2s;font-family:inherit}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group input[type="date"]{color-scheme:dark}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-top:4px;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#ea6c0f}
.btn-secondary{background:var(--accent2);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-family:inherit;width:auto}
.btn-pdf{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
.btn-pdf:hover{background:rgba(239,68,68,.25)}
.btn-excel{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3)}
.btn-excel:hover{background:rgba(34,197,94,.25)}
.alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.alert.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;display:block}
.alert.success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#86efac;display:block}
.divider{text-align:center;color:var(--muted);font-size:12px;margin:20px 0;position:relative}
/* MAIN APP */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{font-weight:700;font-size:16px;color:var(--accent)}
.station-badge{background:var(--accent2);color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:8px}
.idle-bar{height:3px;background:var(--border);position:relative;overflow:hidden}
.idle-progress{height:100%;background:var(--accent);transition:width 1s linear;width:100%}
.main-content{flex:1;padding:16px;padding-bottom:80px;max-width:768px;margin:0 auto;width:100%}
/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;height:64px;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:10px;font-weight:500;transition:.2s;padding:8px 0}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--surface2);border-radius:10px;padding:14px}
.stat-value{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
/* CHARTS */
.chart-wrap{position:relative;height:180px;margin-top:8px}
.chart-wrap-sm{position:relative;height:140px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
/* TANK BARS */
.tank-bar{background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:8px}
.tank-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tank-name{font-size:13px;font-weight:600}
.tank-pct{font-size:12px;color:var(--muted)}
.progress-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:.6s}
.fuel-ms{background:linear-gradient(90deg,#22c55e,#16a34a)}
.fuel-hsd{background:linear-gradient(90deg,#3b82f6,#1d4ed8)}
.fuel-cng{background:linear-gradient(90deg,#f97316,#ea580c)}
/* SALE FORM */
.fuel-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.fuel-btn{padding:14px 8px;border:2px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);cursor:pointer;text-align:center;font-weight:600;transition:.2s}
.fuel-btn.selected{border-color:var(--accent);background:rgba(249,115,22,.1)}
.fuel-btn .fuel-price{font-size:11px;color:var(--muted);margin-top:2px}
.amount-display{background:var(--surface2);border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.amount-display .rupee{font-size:36px;font-weight:700;color:var(--accent)}
.amount-display .litres{font-size:13px;color:var(--muted);margin-top:4px}
.keypad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.key{padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;text-align:center;transition:.1s;font-family:inherit}
.key:active{background:var(--border);transform:scale(.95)}
.key.key-del{background:rgba(239,68,68,.15);color:var(--red)}
.pay-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.pay-btn{padding:12px 6px;border:2px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);cursor:pointer;text-align:center;font-size:12px;font-weight:600;transition:.2s}
.pay-btn.selected{border-color:var(--green);background:rgba(34,197,94,.1);color:var(--green)}
.mode-toggle{display:flex;background:var(--surface2);border-radius:8px;padding:3px;margin-bottom:12px;gap:3px}
.mode-btn{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:.2s}
.mode-btn.active{background:var(--surface);color:var(--text)}
/* LISTS */
.list-item{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.list-item-left{flex:1}
.list-item-title{font-size:14px;font-weight:600}
.list-item-sub{font-size:12px;color:var(--muted);margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-ms{background:rgba(34,197,94,.2);color:#4ade80}
.badge-hsd{background:rgba(59,130,246,.2);color:#93c5fd}
.badge-cng{background:rgba(249,115,22,.2);color:#fdba74}
.badge-cash{background:rgba(234,179,8,.2);color:#fbbf24}
.badge-upi{background:rgba(139,92,246,.2);color:#c4b5fd}
.badge-credit{background:rgba(239,68,68,.2);color:#fca5a5}
.badge-overdue{background:rgba(239,68,68,.25);color:#fca5a5;border:1px solid rgba(239,68,68,.4)}
.badge-ok{background:rgba(34,197,94,.2);color:#4ade80}
/* TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.data-table th{background:var(--surface2);padding:10px 8px;text-align:left;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.data-table td{padding:10px 8px;border-bottom:1px solid rgba(45,51,72,.5);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:rgba(255,255,255,.02)}
.data-table .neg{color:var(--red);font-weight:600}
.data-table .pos{color:var(--green);font-weight:600}
.data-table .total-row td{background:rgba(249,115,22,.07);font-weight:700;border-top:1px solid var(--border)}
/* REPORT TOOLBAR */
.report-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.report-toolbar .form-group{margin:0;flex:1;min-width:140px}
.report-toolbar .form-group input{padding:10px 12px}
/* MOVEMENT TABLE */
.movement-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.movement-header{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.movement-title{font-weight:700;font-size:14px}
/* UPI RECON */
.recon-row{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--surface2);border-radius:10px;margin-bottom:8px}
.recon-app{display:flex;align-items:center;gap:10px;font-weight:600}
.recon-expected{font-size:14px;font-weight:700}
.recon-diff-pos{color:var(--green);font-weight:700}
.recon-diff-neg{color:var(--red);font-weight:700}
.recon-input{width:110px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;text-align:right;outline:none}
.recon-input:focus{border-color:var(--accent2)}
/* SUPER ADMIN */
.sa-badge{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.station-row{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:10px}
.station-row-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.plan-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.plan-trial{background:rgba(234,179,8,.2);color:#fbbf24}
.plan-basic{background:rgba(59,130,246,.2);color:#93c5fd}
.plan-pro{background:rgba(34,197,94,.2);color:#4ade80}
.plan-enterprise{background:rgba(249,115,22,.2);color:#fdba74}
/* MISC */
.section-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.back-btn{background:transparent;border:none;color:var(--accent);cursor:pointer;margin-bottom:14px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:4px;font-family:inherit;padding:0}
input,select,textarea{font-family:inherit}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:500;z-index:999;transition:.3s;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:#fca5a5}
.export-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.summary-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sum-box{background:var(--surface2);border-radius:10px;padding:12px;text-align:center}
.sum-val{font-size:18px;font-weight:700;color:var(--accent)}
.sum-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(45,51,72,.4);font-size:13px}
.info-row:last-child{border:none}
.info-label{color:var(--muted)}
.info-value{font-weight:600}
</style>
</head>
<body>

<!-- ═══ AUTH SCREEN ═══════════════════════════════════════════════════ -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">⛽</div>
      <h1>FuelBunk Pro</h1>
      <p>Multi-Station Management Platform</p>
    </div>
    <div id="authAlert" class="alert"></div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
      <button class="tab-btn" onclick="switchAuthTab('register')">Register</button>
      <button class="tab-btn" onclick="switchAuthTab('super')">Super Admin</button>
    </div>
    <div id="loginForm">
      <div class="form-group"><label>Station Code</label><input id="loginStation" type="text" placeholder="e.g. DEMO01" style="text-transform:uppercase"/></div>
      <div class="form-group"><label>Username</label><input id="loginUser" type="text" placeholder="Username" autocomplete="username"/></div>
      <div class="form-group"><label>Password</label><input id="loginPass" type="password" placeholder="Password" autocomplete="current-password"/></div>
      <button class="btn btn-primary" onclick="doLogin()">Login →</button>
    </div>
    <div id="registerForm" class="hidden">
      <div class="form-group"><label>Station Code <span style="color:var(--muted);font-size:10px">(4–10 chars)</span></label><input id="regCode" type="text" placeholder="e.g. HPCL001" style="text-transform:uppercase" maxlength="10"/></div>
      <div class="form-group"><label>Station Name</label><input id="regName" type="text" placeholder="Sharma Filling Station"/></div>
      <div class="form-group"><label>Owner Username</label><input id="regUser" type="text" placeholder="Min 4 characters"/></div>
      <div class="form-group"><label>Owner Password <span style="color:var(--muted);font-size:10px">(Upper+Lower+Number+Special)</span></label><input id="regPass" type="password" placeholder="Min 8 chars"/></div>
      <div class="form-group"><label>Full Name</label><input id="regFullName" type="text" placeholder="Owner's full name"/></div>
      <div class="form-group"><label>Mobile</label><input id="regMobile" type="tel" placeholder="10-digit mobile"/></div>
      <button class="btn btn-secondary" onclick="doRegister()">Register & Start Free Trial →</button>
      <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:12px">✓ 30-day free trial • No credit card needed</p>
    </div>
    <div id="superForm" class="hidden">
      <div style="background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:#c4b5fd">🛡️ Super Admin — manages all stations</div>
      <div class="form-group"><label>Username</label><input id="saUser" type="text" placeholder="superadmin"/></div>
      <div class="form-group"><label>Password</label><input id="saPass" type="password" placeholder="Password"/></div>
      <button class="btn btn-outline" style="border-color:#7c3aed;color:#c4b5fd" onclick="doSuperLogin()">Super Admin Login →</button>
    </div>
  </div>
</div>

<!-- ═══ MAIN APP ══════════════════════════════════════════════════════ -->
<div id="app">
  <div class="idle-bar"><div class="idle-progress" id="idleBar"></div></div>
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:20px">⛽</span>
      <span class="topbar-logo">FuelBunk Pro</span>
      <span id="stationBadge" class="station-badge"></span>
    </div>
    <div class="topbar-right">
      <span id="userBadge" style="font-size:12px;color:var(--muted)"></span>
      <button onclick="doLogout()" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:20px" title="Logout">⏻</button>
    </div>
  </div>
  <div class="main-content" id="mainContent"></div>
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="navigate('dashboard')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard
    </button>
    <button class="nav-item" onclick="navigate('sale')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Quick Sale
    </button>
    <button class="nav-item" onclick="navigate('shifts')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Shifts
    </button>
    <button class="nav-item" onclick="navigate('stock')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Stock
    </button>
    <button class="nav-item" onclick="navigate('more')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>More
    </button>
  </nav>
</div>

<!-- ═══ SUPER ADMIN ═══════════════════════════════════════════════════ -->
<div id="superApp" style="display:none;flex-direction:column;min-height:100vh">
  <div class="topbar">
    <div class="topbar-left"><span style="font-size:20px">🛡️</span><span class="topbar-logo">FuelBunk Pro</span><span class="sa-badge">SUPER ADMIN</span></div>
    <div class="topbar-right"><button onclick="doLogout()" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:20px">⏻</button></div>
  </div>
  <div style="padding:16px;max-width:900px;margin:0 auto;width:100%" id="superContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let accessToken='', refreshToken='', currentUser=null, currentStation=null, isSuperAdmin=false;
let currentTab='dashboard', idleTimer=null, idleTimeout=15*60, idleRemaining=idleTimeout;
let currentFuel='MS', currentPayMode='cash', entryMode='amount', entryValue='';
let shiftId=null, tanks=[], customers=[];
let activeCharts = {};

// ── Chart cleanup helper ──────────────────────────────────────────────────
function destroyChart(id) {
  if (activeCharts[id]) { try { activeCharts[id].destroy(); } catch(e){} delete activeCharts[id]; }
  const el = document.getElementById(id);
  if (el) { const p = el.parentNode; const nc = document.createElement('canvas'); nc.id = id; p.replaceChild(nc, el); }
}

// ── Init ──────────────────────────────────────────────────────────────────
window.onload = async () => {
  const t = sessionStorage.getItem('access_token'), r = sessionStorage.getItem('refresh_token'), sa = sessionStorage.getItem('is_super_admin');
  if (t) { accessToken=t; refreshToken=r; if (sa==='true') { isSuperAdmin=true; await resumeSuperAdmin(); } else await resumeSession(); }
};

async function apiFetch(path, opts={}) {
  opts.headers = {'Content-Type':'application/json',...(accessToken?{Authorization:`Bearer ${accessToken}`}:{}),...opts.headers};
  if (opts.body && typeof opts.body !== 'string') opts.body = JSON.stringify(opts.body);
  let res = await fetch(API+path, opts);
  if (res.status===401 && refreshToken) {
    const r2 = await fetch(API+'/api/auth/refresh',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refreshToken})});
    if (r2.ok) { const d=await r2.json(); accessToken=d.accessToken; sessionStorage.setItem('access_token',accessToken); opts.headers.Authorization=`Bearer ${accessToken}`; res=await fetch(API+path,opts); }
    else { doLogout(); throw new Error('Session expired'); }
  }
  return res;
}

// ── Auth ──────────────────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['login','register','super'][i]===tab));
  ['loginForm','registerForm','superForm'].forEach((id,i)=>document.getElementById(id).classList.toggle('hidden',['login','register','super'][i]!==tab));
  document.getElementById('authAlert').className='alert';
}
function showAuthAlert(msg,type='error'){const el=document.getElementById('authAlert');el.textContent=msg;el.className=`alert ${type}`;}
async function doLogin(){
  const station=document.getElementById('loginStation').value.trim().toUpperCase();
  const username=document.getElementById('loginUser').value.trim();
  const password=document.getElementById('loginPass').value;
  if(!station||!username||!password) return showAuthAlert('Please fill all fields.');
  try{
    const res=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stationCode:station,username,password})});
    const data=await res.json();
    if(!res.ok) return showAuthAlert(data.error||'Login failed.');
    accessToken=data.accessToken; refreshToken=data.refreshToken; currentUser=data.user; currentStation=data.station; isSuperAdmin=false;
    sessionStorage.setItem('access_token',accessToken); sessionStorage.setItem('refresh_token',refreshToken); sessionStorage.setItem('is_super_admin','false');
    showApp();
  }catch(e){showAuthAlert('Connection error.');}
}
async function doRegister(){
  const stationCode=document.getElementById('regCode').value.trim().toUpperCase();
  const stationName=document.getElementById('regName').value.trim();
  const ownerUsername=document.getElementById('regUser').value.trim();
  const ownerPassword=document.getElementById('regPass').value;
  const ownerFullName=document.getElementById('regFullName').value.trim();
  const mobile=document.getElementById('regMobile').value.trim();
  if(!stationCode||!stationName||!ownerUsername||!ownerPassword||!ownerFullName) return showAuthAlert('Please fill all required fields.');
  try{
    const res=await fetch(API+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stationCode,stationName,ownerUsername,ownerPassword,ownerFullName,mobile})});
    const data=await res.json();
    if(!res.ok) return showAuthAlert(data.error||(data.errors?.[0]?.msg)||'Registration failed.');
    showAuthAlert(`✓ Station ${stationCode} registered! Login now.`,'success');
    setTimeout(()=>{document.getElementById('loginStation').value=stationCode;document.getElementById('loginUser').value=ownerUsername;switchAuthTab('login');},2000);
  }catch(e){showAuthAlert('Connection error.');}
}
async function doSuperLogin(){
  const username=document.getElementById('saUser').value.trim(), password=document.getElementById('saPass').value;
  if(!username||!password) return showAuthAlert('Please fill all fields.');
  try{
    const res=await fetch(API+'/api/auth/super/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data=await res.json();
    if(!res.ok) return showAuthAlert(data.error||'Login failed.');
    accessToken=data.accessToken; refreshToken=data.refreshToken; isSuperAdmin=true; currentUser=data.user;
    sessionStorage.setItem('access_token',accessToken); sessionStorage.setItem('refresh_token',refreshToken); sessionStorage.setItem('is_super_admin','true');

}
async function resumeSession(){try{const res=await apiFetch('/api/auth/me');if(!res.ok){sessionStorage.clear();return;}const data=await res.json();currentUser=data.user;currentStation=data.station;showApp();}catch{sessionStorage.clear();}}
async function resumeSuperAdmin(){try{const res=await apiFetch('/api/auth/me');if(!res.ok){sessionStorage.clear();return;}currentUser=(await res.json()).user;showSuperAdmin();}catch{sessionStorage.clear();}}
function doLogout(){
  if(refreshToken) apiFetch('/api/auth/logout',{method:'POST',body:JSON.stringify({refreshToken})}).catch(()=>{});
  sessionStorage.clear(); accessToken=''; refreshToken=''; currentUser=null; currentStation=null; isSuperAdmin=false;
  document.getElementById('authScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('superApp').style.display='none';

// ── App Init ──────────────────────────────────────────────────────────────
function showApp(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('superApp').style.display='none';
  document.getElementById('stationBadge').textContent=currentStation?.code||'';

  startIdleTimer(); navigate('dashboard');
}
function showSuperAdmin(){
  document.getElementById('authScreen').style.display='none';
  document.getElementById('app').style.display='none';
  document.getElementById('superApp').style.display='flex';

}
function startIdleTimer(){
  idleRemaining=idleTimeout; clearInterval(idleTimer);
  idleTimer=setInterval(()=>{idleRemaining--;document.getElementById('idleBar').style.width=(idleRemaining/idleTimeout*100)+'%';if(idleRemaining<=0){showToast('Session expired.','error');doLogout();}},1000);
  ['touchstart','click','keydown','mousemove'].forEach(e=>document.addEventListener(e,()=>{idleRemaining=idleTimeout;},{passive:true}));
}

async function renderSale(){

function renderSaleUI(){
  const prices={MS:currentStation?.msPrice||102,HSD:currentStation?.hsdPrice||90,CNG:currentStation?.cngPrice||85};
  const price=prices[currentFuel]||100;
  const qty=entryMode==='litres'?parseFloat(entryValue||0):parseFloat(entryValue||0)/price;

  document.getElementById('mainContent').innerHTML=`
    <div class="card-title">Select Fuel</div>

    <div class="mode-toggle"><button class="mode-btn ${entryMode==='amount'?'active':''}" onclick="setMode('amount')">₹ Amount</button><button class="mode-btn ${entryMode==='litres'?'active':''}" onclick="setMode('litres')">⛽ Litres</button></div>
    <div class="amount-display"><div class="rupee">${entryMode==='amount'?'₹'+entryValue:'⛽'+entryValue}</div><div class="litres">${entryMode==='amount'?`≈ ${qty.toFixed(2)}L`:`≈ ₹${amt.toFixed(2)}`}</div></div>
    <div class="keypad">${['1','2','3','4','5','6','7','8','9','.','0','⌫'].map(k=>`<button class="key ${k==='⌫'?'key-del':''}" onclick="keyPress('${k}')">${k}</button>`).join('')}</div>
    <div class="card-title">Payment Mode</div>
    <div class="pay-grid">${['cash','phonepe','gpay','paytm','card','credit'].map(p=>`<button class="pay-btn ${currentPayMode===p?'selected':''}" onclick="selectPay('${p}')">${{cash:'💵 Cash',phonepe:'📱 PhonePe',gpay:'🟢 GPay',paytm:'🔵 Paytm',card:'💳 Card',credit:'📋 Credit'}[p]}</button>`).join('')}</div>
    ${currentPayMode==='credit'?`<div class="form-group"><label>Customer</label><select id="creditCust"><option value="">-- Select --</option>${customers.map(c=>`<option value="${c.id}">${c.company_name} (₹${fmt(c.outstanding)} due)</option>`).join('')}</select></div>`:''}
    <button class="btn btn-primary" onclick="submitSale(${price},${qty.toFixed(4)},${amt.toFixed(2)})" style="margin-top:8px" ${!shiftId?'disabled':''}>
      ${!shiftId?'⚠️ Open Shift First':'Record Sale ₹'+amt.toFixed(2)}</button>`;
}
function selectFuel(f){currentFuel=f;entryValue='';renderSaleUI();}
function selectPay(p){currentPayMode=p;renderSaleUI();}
function setMode(m){entryMode=m;entryValue='';renderSaleUI();}
function keyPress(k){
  if(k==='⌫'){entryValue=entryValue.slice(0,-1);}
  else if(k==='.'&&entryValue.includes('.'))return;
  else if(entryValue.length>=8)return;
  else entryValue+=k;
  renderSaleUI();
}
async function submitSale(rate,quantity,amount){
  if(!entryValue||parseFloat(entryValue)<=0)return showToast('Enter amount or litres','error');
  if(!shiftId)return showToast('Open a shift first','error');
  const custId=currentPayMode==='credit'?document.getElementById('creditCust')?.value:null;
  const body={fuelType:currentFuel,quantity,rate,amount,paymentMode:currentPayMode,shiftId,customerId:custId||undefined};
  try{
    const res=await apiFetch('/api/sales',{method:'POST',body});
    const data=await res.json();
    if(!res.ok)return showToast(data.error||data.errors?.[0]?.msg||'Error','error');
    showToast(`✓ ₹${amount.toFixed(2)} — ${data.invoiceNo}`,'success');
    entryValue=''; renderSaleUI();
  }catch{showToast('Network error','error');}
}

  document.getElementById('mainContent').innerHTML=`
    <button class="back-btn" onclick="renderMore()">← Back</button>

      <div style="align-self:flex-end;padding-bottom:0">

      </div>
    </div>
    <div class="summary-strip">
      <div class="sum-box"><div class="sum-val">${data.reduce((a,b)=>a+b.txns,0)}</div><div class="sum-lbl">Total Txns</div></div>
      <div class="sum-box"><div class="sum-val">₹${fmt(total)}</div><div class="sum-lbl">Expected</div></div>
      <div class="sum-box"><div class="sum-val" id="totalMatchVal">—</div><div class="sum-lbl">Bank Total</div></div>
    </div>
    <div class="card">
      <div class="card-title">App-wise Comparison — Enter bank credited amount</div>
      ${data.length?data.map(u=>`
        <div class="recon-row">
          <div class="recon-app">${{phonepe:'📱',gpay:'🟢',paytm:'🔵'}[u.payment_mode]||'💳'} <span>${{phonepe:'PhonePe',gpay:'Google Pay',paytm:'Paytm'}[u.payment_mode]||u.payment_mode}</span></div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="text-align:right"><div class="recon-expected">₹${fmt(u.amount)}</div><div style="font-size:10px;color:var(--muted)">${u.txns} txns</div></div>
            <div style="text-align:center;color:var(--muted);font-size:11px">vs</div>
            <input class="recon-input" type="number" placeholder="Bank amt" id="bank_${u.payment_mode}" oninput="calcReconDiff()" value=""/>
            <div id="diff_${u.payment_mode}" style="min-width:70px;text-align:right;font-size:13px;font-weight:700;color:var(--muted)">—</div>
          </div>
        </div>`).join(''):`<div class="empty"><div class="empty-icon">💳</div>No UPI transactions on ${date}</div>`}
      ${data.length?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700">Total</span>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-weight:700">₹${fmt(total)}</span>
          <span style="color:var(--muted)">vs</span>
          <span id="totalBank" style="font-weight:700;color:var(--muted)">₹—</span>
          <span id="totalDiff" style="font-weight:700;min-width:80px;text-align:right"></span>
        </div>
      </div>`:''}
    </div>
    <div class="card" style="background:rgba(59,130,246,.05);border-color:rgba(59,130,246,.2)">
      <div style="font-size:12px;color:#93c5fd">
        <strong>How to reconcile:</strong> Check your PhonePe/GPay/Paytm business settlement report and enter the bank-credited amount for each app. Any difference indicates unsettled transactions or timing differences.
      </div>
    </div>`;
  window._upiData = { data, date, total };
}
function calcReconDiff(){
  let bankTotal=0;
  if(!window._upiData)return;
  window._upiData.data.forEach(u=>{
    const inp=document.getElementById(`bank_${u.payment_mode}`);
    const diffEl=document.getElementById(`diff_${u.payment_mode}`);
    if(!inp||!diffEl)return;
    const bankAmt=parseFloat(inp.value||0);
    if(bankAmt>0){
      bankTotal+=bankAmt;
      const diff=bankAmt-(u.amount||0);
      diffEl.textContent=(diff>=0?'+':'')+'₹'+fmt(Math.abs(diff));
      diffEl.className=diff>=0?'recon-diff-pos':'recon-diff-neg';
    } else { diffEl.textContent='—'; diffEl.style.color='var(--muted)'; }
  });
  const totalBankEl=document.getElementById('totalBank');
  const totalDiffEl=document.getElementById('totalDiff');
  const totalMatchEl=document.getElementById('totalMatchVal');
  if(totalBankEl&&bankTotal>0){
    totalBankEl.textContent='₹'+fmt(bankTotal);
    const td=bankTotal-window._upiData.total;
    totalDiffEl.textContent=(td>=0?'+':'')+'₹'+fmt(Math.abs(td));
    totalDiffEl.style.color=td===0?'var(--green)':td>0?'var(--green)':'var(--red)';
    totalMatchEl.textContent='₹'+fmt(bankTotal);
    totalMatchEl.style.color=Math.abs(td)<1?'var(--green)':'var(--red)';
  }
}

function pdfHeader(doc, title, subtitle){
  doc.setFillColor(15,17,23);
  doc.rect(0,0,210,30,'F');
  doc.setTextColor(249,115,22);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('FuelBunk Pro',14,12);
  doc.setTextColor(241,245,249);
  doc.setFontSize(12); doc.text(title,14,20);
  doc.setTextColor(148,163,184);
  doc.setFontSize(9); doc.text(subtitle,14,27);
  doc.setTextColor(0,0,0);
  return 36;
}
function pdfFooter(doc){
  const pg=doc.internal.getNumberOfPages();
  for(let i=1;i<=pg;i++){doc.setPage(i);doc.setFontSize(8);doc.setTextColor(148,163,184);doc.text(`FuelBunk Pro · Page ${i} of ${pg} · Generated ${new Date().toLocaleString('en-IN')}`,14,doc.internal.pageSize.height-8);}
}

async function exportDailyPDF(date){
  showToast('Generating PDF...','success');
  const res=await apiFetch(`/api/reports/daily-enhanced?date=${date}`);
  const {data}=await res.json();
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  let y=pdfHeader(doc,`Daily Sales Report`,`Date: ${date} · Station: ${currentStation?.name||currentStation?.code||''}`);
  // Summary
  const t=data.totals||{};
  doc.autoTable({startY:y,head:[['Revenue','Total Sales','Total Litres']],body:[[`₹${fmt(t.revenue)}`,t.txns||0,`${(t.litres||0).toFixed(2)}L`]],styles:{fillColor:[26,31,46],textColor:[241,245,249],fontStyle:'bold'},headStyles:{fillColor:[249,115,22],textColor:[255,255,255]},margin:{left:14,right:14}});
  y=doc.lastAutoTable.finalY+8;
  // Fuel-wise
  if(data.fuelWise?.length){doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text('Fuel-Wise Breakdown',14,y);y+=4;doc.autoTable({startY:y,head:[['Fuel Type','Qty (L)','Transactions','Amount (₹)']],body:data.fuelWise.map(f=>[f.fuel_type,(f.qty||0).toFixed(2),f.txns,`₹${fmt(f.amount)}`]),headStyles:{fillColor:[35,40,56]},alternateRowStyles:{fillColor:[240,243,250]},margin:{left:14,right:14}});y=doc.lastAutoTable.finalY+8;}
  // Nozzle-wise
  if(data.nozzleWise?.length){doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text('Nozzle-Wise Breakdown',14,y);y+=4;doc.autoTable({startY:y,head:[['Nozzle','Fuel','Qty (L)','Amount (₹)']],body:data.nozzleWise.map(n=>[n.nozzle_name||'—',n.fuel_type,(n.qty||0).toFixed(2),`₹${fmt(n.amount)}`]),headStyles:{fillColor:[35,40,56]},alternateRowStyles:{fillColor:[240,243,250]},margin:{left:14,right:14}});y=doc.lastAutoTable.finalY+8;}
  // Payment-wise
  if(data.paymentWise?.length){doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text('Payment-Wise Breakdown',14,y);y+=4;doc.autoTable({startY:y,head:[['Mode','Transactions','Amount (₹)']],body:[...data.paymentWise.map(p=>[p.payment_mode,p.txns,`₹${fmt(p.amount)}`]),['TOTAL',data.paymentWise.reduce((a,b)=>a+b.txns,0),`₹${fmt(data.paymentWise.reduce((a,b)=>a+(b.amount||0),0))}`]],headStyles:{fillColor:[35,40,56]},alternateRowStyles:{fillColor:[240,243,250]},margin:{left:14,right:14}});}
  pdfFooter(doc);
  doc.save(`FuelBunk-Daily-Report-${date}.pdf`);
}

async function exportUPIPDF(date){
  const data=window._upiData?.data||[];
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();
  let y=pdfHeader(doc,'UPI Reconciliation Report',`Date: ${date} · Station: ${currentStation?.name||currentStation?.code||''}`);
  const rows=data.map(u=>{
    const bankEl=document.getElementById(`bank_${u.payment_mode}`);
    const bankAmt=bankEl?parseFloat(bankEl.value||0):0;
    const diff=bankAmt>0?bankAmt-(u.amount||0):null;
    return [u.payment_mode,u.txns,`₹${fmt(u.amount)}`,bankAmt>0?`₹${fmt(bankAmt)}`:'Not entered',diff!==null?(diff>=0?'+':'')+`₹${fmt(Math.abs(diff))}`:'—'];
  });
  doc.autoTable({startY:y,head:[['App','Txns','System Amount','Bank Amount','Difference']],body:rows,headStyles:{fillColor:[249,115,22]},alternateRowStyles:{fillColor:[240,243,250]},margin:{left:14,right:14}});
  pdfFooter(doc); doc.save(`FuelBunk-UPI-Recon-${date}.pdf`);
}

// ── SUPER ADMIN ────────────────────────────────────────────────────────────
async function renderSuperDashboard(){
  const [statsRes,stationsRes]=await Promise.all([apiFetch('/api/super/stats'),apiFetch('/api/super/stations')]);
  const stats=(await statsRes.json()).data; const stations=(await stationsRes.json()).data||[];
  document.getElementById('superContent').innerHTML=`
    <div class="section-title">Platform Overview</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${stats.totalStations}</div><div class="stat-label">Total Stations</div></div>
      <div class="stat-card"><div class="stat-value">${stats.activeStations}</div><div class="stat-label">Active</div></div>
      <div class="stat-card"><div class="stat-value">₹${fmt(stats.todayRevenue)}</div><div class="stat-label">Today Platform Revenue</div></div>
      <div class="stat-card"><div class="stat-value">${stats.totalUsers}</div><div class="stat-label">Total Users</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px">
      <div class="section-title" style="margin:0">All Stations</div>
      <button onclick="showAddStation()" style="background:var(--accent);border:none;color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600">+ New Station</button>
    </div>
    ${stations.map(s=>`<div class="station-row">
      <div class="station-row-header">
        <div><span style="width:8px;height:8px;border-radius:50%;background:${s.is_active?'var(--green)':'var(--red)'};display:inline-block;margin-right:6px"></span><strong>${s.station_code}</strong> — ${s.station_name}</div>
        <span class="plan-badge plan-${s.plan}">${s.plan.toUpperCase()}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:12px;color:var(--muted);margin-bottom:10px">
        <div>👥 ${s.user_count} users</div><div>🛒 ${s.today_sales} sales</div><div>₹${fmt(s.today_revenue)} today</div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="toggleStation(${s.id},${s.is_active?0:1})" style="flex:1;padding:8px;border:1px solid var(--border);background:transparent;color:${s.is_active?'var(--red)':'var(--green)'};border-radius:8px;cursor:pointer;font-size:12px">${s.is_active?'Suspend':'Activate'}</button>
        <button onclick="changePlan(${s.id},'${s.plan}')" style="flex:1;padding:8px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:8px;cursor:pointer;font-size:12px">Change Plan</button>
      </div>
    </div>`).join('')||'<div class="empty">No stations yet</div>'}`;
}
function showAddStation(){
  document.getElementById('superContent').innerHTML=`
    <button class="back-btn" onclick="renderSuperDashboard()">← Back</button>
    <div class="section-title">Add New Station</div>
    <div class="card">
      <div class="form-group"><label>Station Code</label><input id="nsCode" placeholder="e.g. BPCL001" style="text-transform:uppercase"/></div>
      <div class="form-group"><label>Station Name</label><input id="nsName" placeholder="Station name"/></div>
      <div class="form-group"><label>Owner Username</label><input id="nsUser" placeholder="Min 4 chars"/></div>
      <div class="form-group"><label>Owner Password</label><input id="nsPass" type="password" placeholder="Upper+Lower+Number+Special"/></div>
      <div class="form-group"><label>Owner Full Name</label><input id="nsFull" placeholder="Full name"/></div>
      <div class="form-group"><label>Plan</label><select id="nsPlan"><option value="trial">Trial</option><option value="basic">Basic</option><option value="pro">Pro</option><option value="enterprise">Enterprise</option></select></div>
      <button class="btn btn-primary" onclick="createStation()">Create Station</button>
    </div>`;
}
async function createStation(){
  const body={stationCode:document.getElementById('nsCode').value.trim().toUpperCase(),stationName:document.getElementById('nsName').value.trim(),ownerUsername:document.getElementById('nsUser').value.trim(),ownerPassword:document.getElementById('nsPass').value,ownerFullName:document.getElementById('nsFull').value.trim(),plan:document.getElementById('nsPlan').value};
  const res=await apiFetch('/api/super/stations',{method:'POST',body});
  const data=await res.json(); if(!res.ok)return showToast(data.error||data.errors?.[0]?.msg||'Error','error');
  showToast('✓ Station created','success'); renderSuperDashboard();
}
async function toggleStation(id,active){await apiFetch(`/api/super/stations/${id}`,{method:'PUT',body:{isActive:active}});showToast(active?'✓ Activated':'Suspended','success');renderSuperDashboard();}
async function changePlan(id,cur){const plans=['trial','basic','pro','enterprise'];const next=plans[(plans.indexOf(cur)+1)%plans.length];await apiFetch(`/api/super/stations/${id}`,{method:'PUT',body:{plan:next}});showToast(`✓ Plan → ${next}`,'success');renderSuperDashboard();}

// ── Utilities ─────────────────────────────────────────────────────────────
function fmt(n){return (n||0).toLocaleString('en-IN',{maximumFractionDigits:2});}
function payIcon(m){return {cash:'💵',phonepe:'📱',gpay:'🟢',paytm:'🔵',card:'💳',credit:'📋',neft:'🏦'}[m]||'💳';}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}
</script>
