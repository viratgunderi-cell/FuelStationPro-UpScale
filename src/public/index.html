  <!-- INLINE critical styles — visible even if app.css fails to load -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0c10; color: #f4f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* Splash screen — visible by default, JS hides it */
    #splash {
      position: fixed; inset: 0; z-index: 99999;
      background: #0a0c10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
    }
    #splash-icon { font-size: 56px; }
    #splash-title { font-size: 22px; font-weight: 800; color: #f4f5f7; letter-spacing: -0.5px; }
    #splash-msg { font-size: 13px; color: #9498a5; text-align: center; max-width: 280px; line-height: 1.6; }
    #splash-bar {
      width: 180px; height: 3px; background: #1c2130; border-radius: 2px; overflow: hidden; margin-top: 4px;
    }
    #splash-bar-fill {
      height: 100%; width: 0%; background: #d4940f; border-radius: 2px;
      transition: width 0.4s ease;
    }
    #splash-reload {
      display: none; margin-top: 8px;
      background: #d4940f; color: #000; border: none;
      padding: 10px 22px; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    /* Hide splash when app is ready */
    body.app-ready #splash { display: none !important; }
  </style>
  <!-- FIX F-07: Self-hosted Chart.js so it works offline via SW cache. CDN as fallback. -->
  <script src="/chart.min.js" defer onerror="var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';document.head.appendChild(s)"></script>
  <!-- FIX BUG-05: Removed 'defer' from autosave.js here; it is now loaded at the
       bottom of <body> after all core scripts so it can safely reference utils like toast(). -->
</head>

            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

          </div>

    <div style="min-width:0">

    </div>
  </div>

    <button class="btn btn-ghost btn-sm" onclick="dismissInstall()" style="padding:8px 12px">Later</button>
    <button class="btn btn-accent btn-sm" onclick="installPWA()" style="padding:8px 14px;font-weight:700">⬇ Install</button>
  </div>
</div>

<script>
// Step 1: Boot splash + register/update service worker
(function() {
  try {
    var fill = document.getElementById('splash-bar-fill');
    if (fill) fill.style.width = '20%';
    document.getElementById('splash-msg').textContent = 'Starting...';
  } catch(e) {}

  // Register service worker v12 — works on any HTTPS or localhost origin
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js?v=20.0', { scope: '/' })  // FIX F-08: version matches sw.js
      .then(function(reg) {
        reg.update(); // check for updates on every load

        // FIX 30: wire up update detection so users get a prompt instead of stale app
        // When a new SW is waiting, show a non-intrusive toast with a reload action
        function promptUpdate(worker) {
          if (!worker) return;
          if (window._swUpdatePrompted) return;
          window._swUpdatePrompted = true;

          // Show a persistent, dismissible update banner at the top of the page
          var showBanner = function() {
            if (!document.body) { setTimeout(showBanner, 500); return; }
            var existing = document.getElementById('fb-update-banner');
            if (existing) return;
            var banner = document.createElement('div');
            banner.id = 'fb-update-banner';
            banner.style.cssText = [
              'position:fixed', 'top:0', 'left:0', 'right:0', 'z-index:99999',
              'background:#1e3a5f', 'color:#f4f5f7', 'font-size:13px', 'font-weight:600',
              'padding:10px 16px', 'display:flex', 'align-items:center', 'gap:12px',
              'box-shadow:0 2px 8px rgba(0,0,0,0.4)', 'font-family:Arial,sans-serif',
            ].join(';');
            banner.innerHTML = [
              '<span style="flex:1">🔄 A new version of FuelBunk Pro is available.</span>',
              '<button id="fb-update-now" style="background:#d4940f;color:#0a0c10;border:none;',
              'border-radius:6px;padding:6px 14px;font-weight:700;cursor:pointer;font-size:12px">',
              'Update Now</button>',
              '<button id="fb-update-dismiss" style="background:transparent;color:#9098a5;border:none;',
              'cursor:pointer;font-size:16px;padding:2px 6px" title="Dismiss">✕</button>',
            ].join('');
            document.body.prepend(banner);
            document.getElementById('fb-update-now').onclick = function() {
              worker.postMessage({ type: 'SKIP_WAITING' });
              banner.innerHTML = '<span style="flex:1">⏳ Updating…</span>';
            };
            document.getElementById('fb-update-dismiss').onclick = function() {
              banner.remove();
            };
          };
          showBanner();

          // Reload once new SW takes control
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            window.location.reload();
          });
        }

        // New SW already waiting (user revisiting tab)
        if (reg.waiting) { promptUpdate(reg.waiting); }

        // New SW installs during this session
        reg.addEventListener('updatefound', function() {
          var newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', function() {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              promptUpdate(newWorker);
            }
          });
        });
      })
      .catch(function(e) { console.warn('[PWA] SW register failed:', e.message); });
  }

  // Show reload button after 20s (mobile needs time to parse 700KB JS)
  var _splashTimeout = /Mobi|Android/i.test(navigator.userAgent) ? 20000 : 10000;
  setTimeout(function() {
    var splash = document.getElementById('splash');
    if (splash && splash.style.display !== 'none' && !document.body.classList.contains('app-ready')) {
      document.getElementById('splash-msg').textContent = 'Taking too long. Try reloading.';
      document.getElementById('splash-reload').style.display = 'inline-block';
    }
  }, _splashTimeout);
})();
</script>

<style>
/* ═══════════════════════════════════════════════════════════
   FUELBUNK PRO — PWA Stylesheet
   Aesthetic: Industrial Utilitarian + Dark Dashboard
   ═══════════════════════════════════════════════════════════ */

/* Google Fonts — loaded async, system fonts used as fallback */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-0: #0a0c10; --bg-1: #10131a; --bg-2: #161a24; --bg-3: #1c2130;
  --surface: #1e2332; --surface-hover: #252b3a;
  --border: #2a3040; --border-light: #1e2535;
  --text-0: #f4f5f7; --text-1: #d0d3db; --text-2: #9498a5; --text-3: #6b7080;
  --accent: #d4940f; --accent-light: #f0b429; --accent-dim: #9e6f0a;
  --green: #22c55e; --green-dim: #166534; --red: #ef4444; --red-dim: #991b1b;
  --blue: #3b82f6; --blue-dim: #1e40af; --purple: #a855f7; --orange: #f97316;
  --cyan: #06b6d4; --yellow: #eab308;
  --petrol-color: #ef4444; --diesel-color: #f97316; --premium-color: #a855f7;
  --radius: 12px; --radius-sm: 8px; --radius-xs: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --font: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Courier New', 'SF Mono', Consolas, monospace;
  --sidebar-w: 240px;
  --topbar-h: 56px;
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font); background: var(--bg-0); color: var(--text-1);
  -webkit-font-smoothing: antialiased; font-size: 14px; line-height: 1.5;
}

/* Splash screen handled via HTML #splash element, not CSS pseudo-element */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── LAYOUT ────────────────────────────────────────────────── */
.app { display: flex; height: 100dvh; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w); background: var(--bg-1); border-right: 1px solid var(--border-light);
  display: flex; flex-direction: column; flex-shrink: 0;
  transition: width 0.3s cubic-bezier(.4,0,.2,1), transform 0.3s cubic-bezier(.4,0,.2,1);
  z-index: 100; overflow: hidden;
}
.sidebar.collapsed { width: 64px; }
.sidebar-brand {
  padding: 16px 18px; border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center; gap: 12px; cursor: pointer; min-height: 64px;
}
.sidebar-brand:hover { background: var(--surface); }
.brand-icon {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent-light));
  display: grid; place-items: center; font-size: 18px;
  box-shadow: 0 2px 12px rgba(212,148,15,0.3);
}
.brand-text { overflow: hidden; white-space: nowrap; transition: opacity 0.2s; }
.brand-text h1 { font-size: 15px; font-weight: 800; color: var(--text-0); letter-spacing: -0.3px; }
.brand-text small { font-size: 10px; color: var(--text-3); font-weight: 500; letter-spacing: 0.5px; }
.sidebar.collapsed .brand-text,
.sidebar.collapsed .nav-label,
.sidebar.collapsed .sidebar-foot { display: none; }
.sidebar.collapsed .nav-btn { justify-content: center; padding: 11px 0; }
.sidebar.collapsed .sidebar-brand { justify-content: center; padding: 16px 14px; }

.nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
.nav-group { margin-bottom: 16px; }
.nav-group-label {
  font-size: 9px; font-weight: 700; color: var(--text-3); text-transform: uppercase;
  letter-spacing: 1.5px; padding: 0 12px 6px; opacity: 0.7;
}
.sidebar.collapsed .nav-group-label { display: none; }
.nav-btn {
  width: 100%; display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: var(--radius-sm); border: none;
  background: transparent; color: var(--text-3); font-size: 13px;
  font-family: var(--font); font-weight: 500; cursor: pointer;
  margin-bottom: 1px; transition: all 0.15s ease; position: relative;
}

  background: linear-gradient(135deg, rgba(212,148,15,0.12), rgba(212,148,15,0.06));
  color: var(--accent-light); font-weight: 600;
}
.nav-btn.active::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 20px; background: var(--accent); border-radius: 0 3px 3px 0;
}
.nav-icon { width: 20px; height: 20px; flex-shrink: 0; display: grid; place-items: center; font-size: 15px; }

.sidebar-foot {
  padding: 12px 16px; border-top: 1px solid var(--border-light);
  font-size: 10px; color: #3a3f4d; text-align: center;
}

  background: var(--green); margin-right: 4px; vertical-align: middle;
  box-shadow: 0 0 6px rgba(34,197,94,0.5);

/* Main area */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  flex-shrink: 0; display: flex; flex-direction: column;
  background: var(--bg-1);
}

  background: rgba(212,148,15,0.05);

.topbar-station-name { font-size: 20px; font-weight: 900; color: var(--accent-light); letter-spacing: -0.4px; display: flex; align-items: center; gap: 8px; }
.topbar-station-loc { font-size: 12px; color: var(--text-3); font-weight: 500; margin-left: 6px; }
.topbar-page-row { display: none; }
.topbar-left .breadcrumb { display: none; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.topbar-clock { text-align: right; }
.topbar-clock .time {
  font-family: var(--mono); font-size: 16px; font-weight: 600;

  display: flex; align-items: center; gap: 6px; padding: 5px 12px;

.status-pill.online .dot { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
.status-pill.offline .dot { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.4); }

.avatar {

  display: grid; place-items: center; font-weight: 800; color: var(--bg-0);
  font-size: 14px; letter-spacing: -0.5px;
}

.content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 24px; }

/* ── COMPONENTS ────────────────────────────────────────────── */

/* Grid */
.g { display: grid; gap: 14px; }
.g-2 { grid-template-columns: repeat(2, 1fr); }
.g-3 { grid-template-columns: repeat(3, 1fr); }
.g-4 { grid-template-columns: repeat(4, 1fr); }
.g-auto-sm { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
.g-auto { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
.g-auto-lg { grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); }
.gap-16 { gap: 16px; }
.gap-20 { gap: 20px; }

.btn-blue-ghost { background: transparent; color: var(--blue); border: 1px solid rgba(59,130,246,0.25); }
.btn-blue-ghost:hover { background: rgba(59,130,246,0.08); }
.btn-green-ghost { background: transparent; color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
.btn-green-ghost:hover { background: rgba(34,197,94,0.08); }
.btn-red { background: var(--red); color: white; }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-block { width: 100%; justify-content: center; }
.btn-icon { padding: 8px; border-radius: var(--radius-sm); }

/* Table */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 10px 14px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; color: var(--text-3);
  border-bottom: 1px solid var(--border); white-space: nowrap;
  background: var(--bg-3);
}
th.r { text-align: right; }
td {
  padding: 10px 14px; font-size: 13px; color: var(--text-1);
  border-bottom: 1px solid var(--border-light); white-space: nowrap;
}
td.r { text-align: right; }
tr:hover td { background: rgba(255,255,255,0.015); }

/* Progress */
.progress { background: var(--bg-0); border-radius: 10px; overflow: hidden; position: relative; }
.progress-bar { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
.progress .pct {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-size: 10px; font-weight: 700; color: var(--text-0); font-family: var(--mono);
}
.progress-xs { height: 4px; border-radius: 2px; }
.progress-sm { height: 6px; border-radius: 3px; }
.progress-md { height: 10px; }
.progress-lg { height: 24px; }

/* Deep box */
.dbox {
  background: var(--bg-0); padding: 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
}
.dbox-lg { padding: 16px; border-radius: var(--radius); }
.dbox-label { font-size: 10px; color: var(--text-3); font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.dbox-value { font-weight: 700; color: var(--text-0); font-size: 15px; }

/* Mini charts */
.mini-bars { display: flex; align-items: flex-end; gap: 3px; height: 56px; }
.mini-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.mini-bar-col .bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 3px; transition: height 0.4s ease; }
.mini-bar-col .lbl { font-size: 8px; color: var(--text-3); font-weight: 600; }

/* Page header */
.page-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-hdr h3 { font-size: 18px; font-weight: 800; color: var(--text-0); letter-spacing: -0.3px; }

/* Filters */
.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-chip {
  padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text-3); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: all 0.15s;
}
.filter-chip:hover { border-color: var(--border); background: var(--surface); }
.filter-chip.active { border-color: var(--accent); background: rgba(212,148,15,0.1); color: var(--accent-light); }

/* Shift card */
.shift-block {
  padding: 14px 16px; border-radius: var(--radius-sm); background: var(--bg-0);
  border: 1px solid var(--border-light); transition: all 0.2s;
}
.shift-block.is-active {
  background: rgba(212,148,15,0.06); border-color: rgba(212,148,15,0.25);
  box-shadow: inset 0 0 0 1px rgba(212,148,15,0.08);
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center;
  justify-content: center; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg-2); border-radius: 16px; padding: 0; width: 520px; max-width: 94vw;
  max-height: 90vh; overflow: hidden; border: 1px solid var(--border);
  box-shadow: 0 25px 60px rgba(0,0,0,0.5); transform: scale(0.95) translateY(10px);
  transition: transform 0.25s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal-head {
  padding: 18px 24px; border-bottom: 1px solid var(--border-light);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-head h3 { font-size: 16px; font-weight: 700; color: var(--text-0); }
.modal-close { background: none; border: none; color: var(--text-3); cursor: pointer; padding: 4px; font-size: 18px; }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; min-height: 0; }
.modal-foot { padding: 14px 24px; border-top: 1px solid var(--border-light); display: flex; justify-content: flex-end; gap: 8px; }

/* Form inputs */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 700; color: var(--text-3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  width: 100%; padding: 10px 14px; background: var(--bg-0); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-0); font-size: 14px; font-family: var(--font);
  outline: none; transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212,148,15,0.1); }
.form-input::placeholder { color: var(--text-3); }
select.form-input { appearance: none; cursor: pointer; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Toast notifications */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 8px; min-width: 280px;
  box-shadow: var(--shadow); animation: toastIn 0.3s ease, toastOut 0.3s ease 3.7s forwards;
  border: 1px solid;
}
.toast-success { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.3); }
.toast-error { background: var(--red-dim); color: var(--red); border-color: rgba(239,68,68,0.3); }
.toast-info { background: var(--blue-dim); color: var(--blue); border-color: rgba(59,130,246,0.3); }
.toast-warning { background: #78350f; color: var(--orange); border-color: rgba(249,115,22,0.3); }

@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(40px); } }

/* UPI QR */
.qr-container {
  background: white; border-radius: 12px; padding: 20px; display: inline-block;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.qr-canvas { display: block; margin: 0 auto; }
.upi-info { text-align: center; margin-top: 12px; }
.upi-id { font-family: var(--mono); font-size: 12px; color: #333; font-weight: 600; }

/* PWA Install banner */
.install-banner {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 900;
  background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
  border-top: 1px solid var(--accent-dim); padding: 14px 24px;
  display: flex; justify-content: space-between; align-items: center;
  transform: translateY(100%); transition: transform 0.4s cubic-bezier(.4,0,.2,1);
}
.install-banner.show { transform: translateY(0); }

/* Offline indicator */
.offline-bar {
  background: var(--red-dim); color: var(--red); text-align: center;
  padding: 4px; font-size: 11px; font-weight: 700; display: none;
}
body.is-offline .offline-bar { display: block; }

/* Tab/page transitions */
.page-enter { animation: pageIn 0.3s ease; }
@keyframes pageIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Fuel colors */
.c-petrol { color: var(--petrol-color); }
.c-diesel { color: var(--diesel-color); }
.c-premium { color: var(--premium-color); }

/* Utility */
.mb-24 { margin-bottom: 24px; }
.mb-20 { margin-bottom: 20px; }
.mb-16 { margin-bottom: 16px; }
.mb-14 { margin-bottom: 14px; }
.mb-12 { margin-bottom: 12px; }
.mb-10 { margin-bottom: 10px; }
.mb-8 { margin-bottom: 8px; }
.mt-16 { margin-top: 16px; }
.mt-12 { margin-top: 12px; }
.mt-8 { margin-top: 8px; }
.fw-500 { font-weight: 500; }
.fw-600 { font-weight: 600; }
.fw-700 { font-weight: 700; }
.fw-800 { font-weight: 800; }
.mono { font-family: var(--mono); }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.flex { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.flex-center { display: flex; align-items: center; }
.flex-col { display: flex; flex-direction: column; }
.text-right { text-align: right; }
.text-center { text-align: center; }

/* ── RESPONSIVE ────────────────────────────────────────────── */
/* ── MOBILE-FIRST BASE (applies to all, overridden by desktop) ─────────────── */
:root {
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

/* Prevent text size inflation on iOS */
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

/* Smooth scrolling + tap highlight removal */
* { -webkit-tap-highlight-color: transparent; }
input, button, select, textarea { touch-action: manipulation; }

/* Full-height safe area on notched phones */
body { padding-bottom: var(--safe-bottom); }

/* Bottom-safe padding for main content when in standalone PWA */
@media (display-mode: standalone) {
  .main-area { padding-bottom: calc(16px + var(--safe-bottom)); }
  .install-banner { display: none !important; } /* already installed */
}

/* Tap targets: minimum 44px for comfort */
.btn { min-height: 44px; }
.btn.btn-sm { min-height: 36px; }
.nav-btn { min-height: 48px; }
.form-input { min-height: 44px; font-size: 16px !important; } /* 16px prevents iOS zoom */

/* ── MOBILE (≤768px) ──────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 80vw !important; max-width: 280px;
    transform: translateX(-100%);
    box-shadow: 6px 0 32px rgba(0,0,0,0.6); z-index: 200;
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    padding-bottom: calc(16px + var(--safe-bottom));
    padding-top: calc(16px + var(--safe-top));
  }
  .sidebar.mobile-open { transform: translateX(0); }
  .sidebar.collapsed { width: 80vw !important; max-width: 280px !important; }
  .sidebar.collapsed .brand-text,
  .sidebar.collapsed .nav-label,
  .sidebar.collapsed .sidebar-foot { display: block; }
  .sidebar.collapsed .nav-btn { justify-content: flex-start; padding: 10px 14px; }
  .sidebar.collapsed .nav-btn span:last-child { display: inline; }
  .mobile-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    z-index: 150; display: none; backdrop-filter: blur(2px);
  }
  .sidebar.mobile-open ~ .mobile-overlay { display: block; }
  .g-2, .g-3, .g-4 { grid-template-columns: 1fr; }
  .content { padding: 12px 14px; }
  .topbar-station-row { padding: 0 14px; }
  .topbar-station-name { font-size: 15px; }
  .mobile-menu-btn { display: flex !important; }
  .status-pills { display: none; }
  /* Cards breathe more on small screens */
  .card-body { padding: 14px; }
  .card-head { padding: 12px 14px; }
  /* Stack form rows on mobile */
  .form-row { grid-template-columns: 1fr !important; gap: 10px; }
  /* Wider stat values */
  .stat-value { font-size: 22px; }
  /* Install banner: full-width, taller tap target */
  .install-banner { padding: 14px 16px; }
}

/* ── SMALL PHONES (≤480px) ────────────────────────────────────────────────── */
@media (max-width: 480px) {
  .g-auto-sm, .g-auto, .g-auto-lg { grid-template-columns: 1fr; }
  .stat-value { font-size: 20px; }
  .content { padding: 10px 12px; }
  /* Pump & nozzle buttons wrap nicely */
  #empPumpNozzleBtns { gap: 6px; }
  #empPumpNozzleBtns .btn { min-width: 64px; flex: 1 1 auto; max-width: 50%; }
  /* Vehicle chip row scrolls horizontally */
  #empVehChips { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  #empVehChips::-webkit-scrollbar { display: none; }

/* Vehicle segmented input */
.veh-seg {
  background: var(--bg-0);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-0);
  font-family: var(--mono);
  font-weight: 800;
  font-size: 20px;
  text-align: center;
  text-transform: uppercase;
  padding: 10px 4px;
  min-height: 52px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.veh-seg::placeholder { color: var(--text-4, #555); font-weight: 500; font-size: 14px; }
.veh-seg:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
}

/* ── DESKTOP (≥769px) ─────────────────────────────────────────────────────── */
@media (min-width: 769px) {
  .mobile-menu-btn { display: none !important; }
  .mobile-overlay { display: none !important; }
}

/* Print styles for reports */
@media print {
  .sidebar, .topbar, .btn, .nav, .install-banner { display: none !important; }
  .main-area { margin: 0; }
  .content { padding: 0; overflow: visible; }
  .card { break-inside: avoid; border: 1px solid #ddd; }
  body { background: white; color: #333; }
  .stat-value { color: #111; }
}

.login-hero{text-align:center;margin-bottom:28px}
.login-logo{
  width:72px;height:72px;border-radius:18px;margin:0 auto 14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  display:grid;place-items:center;font-size:32px;
  box-shadow:0 8px 30px rgba(212,148,15,0.25);
}
.login-title{font-size:26px;font-weight:900;color:var(--text-0);letter-spacing:-0.5px}
.login-sub{font-size:11px;color:var(--text-3);margin-top:6px;letter-spacing:0.1px}
.login-station-name{display:inline-block;font-size:15px;font-weight:900;color:var(--accent-light);letter-spacing:-0.3px;margin-top:8px;padding:4px 16px;background:rgba(212,148,15,0.10);border:1px solid rgba(212,148,15,0.25);border-radius:20px}
.login-station-loc{display:block;font-size:11px;color:var(--text-3);margin-top:4px;font-weight:500}

.login-tabs{
  display:flex;gap:4px;background:var(--bg-1);border-radius:var(--radius);
  padding:4px;margin-bottom:20px;border:1px solid var(--border-light);
}
.login-tab{
  flex:1;padding:11px 16px;border-radius:var(--radius-sm);border:none;
  background:transparent;color:var(--text-3);font-family:var(--font);
  font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;
}
.login-tab.active{background:var(--bg-3);color:var(--text-0);box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.login-tab:hover:not(.active){color:var(--text-2)}

.login-card{
  background:var(--bg-2);border-radius:var(--radius);border:1px solid var(--border);
  padding:24px;animation:loginIn 0.35s ease;
}
@keyframes loginIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.login-footer{text-align:center;font-size:10px;color:#2a2f3d;margin-top:24px}

/* Employee mode: hide sidebar, full width content */
.sidebar.emp-hidden{display:none!important}
.main-area.emp-fullwidth{width:100%}

</style>
