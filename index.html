<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>FuelBunk Pro</title>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#1a1f2e"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root{--bg:#0f1117;--surface:#1a1f2e;--surface2:#232838;--border:#2d3348;--accent:#f97316;--accent2:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--text:#f1f5f9;--muted:#94a3b8;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}
/* ── AUTH SCREENS ── */
#authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#0f1117 0%,#1a1f2e 100%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:440px;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo .icon{font-size:48px;margin-bottom:8px}
.auth-logo h1{font-size:24px;font-weight:700;color:var(--accent)}
.auth-logo p{color:var(--muted);font-size:13px;margin-top:4px}
.tab-bar{display:flex;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:28px;gap:4px}
.tab-btn{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s}
.tab-btn.active{background:var(--accent);color:#fff}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;margin-top:4px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#ea6c0f}
.btn-secondary{background:var(--accent2);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.alert.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;display:block}
.alert.success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#86efac;display:block}
.divider{text-align:center;color:var(--muted);font-size:12px;margin:20px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}
/* ── MAIN APP ── */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{font-weight:700;font-size:16px;color:var(--accent)}
.station-badge{background:var(--accent2);color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:8px}
.idle-bar{height:3px;background:var(--border);position:relative;overflow:hidden}
.idle-progress{height:100%;background:var(--accent);transition:width 1s linear;width:100%}
.main-content{flex:1;padding:16px;padding-bottom:80px;max-width:768px;margin:0 auto;width:100%}
/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;height:64px;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:10px;font-weight:500;transition:.2s;padding:8px 0}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}
/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--surface2);border-radius:10px;padding:14px}
.stat-value{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.tank-bar{background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:8px}
.tank-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tank-name{font-size:13px;font-weight:600}
.tank-pct{font-size:12px;color:var(--muted)}
.progress-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:.6s}
.fuel-ms{background:linear-gradient(90deg,#22c55e,#16a34a)}
.fuel-hsd{background:linear-gradient(90deg,#3b82f6,#1d4ed8)}
.fuel-cng{background:linear-gradient(90deg,#f97316,#ea580c)}
/* ── SALE FORM ── */
.fuel-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.fuel-btn{padding:14px 8px;border:2px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);cursor:pointer;text-align:center;font-weight:600;transition:.2s}
.fuel-btn.selected{border-color:var(--accent);background:rgba(249,115,22,.1)}
.fuel-btn .fuel-price{font-size:11px;color:var(--muted);margin-top:2px}
.amount-display{background:var(--surface2);border-radius:12px;padding:20px;text-align:center;margin-bottom:16px}
.amount-display .rupee{font-size:36px;font-weight:700;color:var(--accent)}
.amount-display .litres{font-size:13px;color:var(--muted);margin-top:4px}
.keypad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.key{padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;text-align:center;transition:.1s}
.key:active{background:var(--border);transform:scale(.95)}
.key.key-0{grid-column:span 2}
.key.key-del{background:rgba(239,68,68,.15);color:var(--red)}
.pay-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.pay-btn{padding:12px 6px;border:2px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);cursor:pointer;text-align:center;font-size:12px;font-weight:600;transition:.2s}
.pay-btn.selected{border-color:var(--green);background:rgba(34,197,94,.1);color:var(--green)}
.mode-toggle{display:flex;background:var(--surface2);border-radius:8px;padding:3px;margin-bottom:12px;gap:3px}
.mode-btn{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:.2s}
.mode-btn.active{background:var(--surface);color:var(--text)}
/* ── LISTS ── */
.list-item{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.list-item-left{flex:1}
.list-item-title{font-size:14px;font-weight:600}
.list-item-sub{font-size:12px;color:var(--muted);margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase}
.badge-ms{background:rgba(34,197,94,.2);color:#4ade80}
.badge-hsd{background:rgba(59,130,246,.2);color:#93c5fd}
.badge-cash{background:rgba(234,179,8,.2);color:#fbbf24}
.badge-upi{background:rgba(139,92,246,.2);color:#c4b5fd}
.badge-credit{background:rgba(239,68,68,.2);color:#fca5a5}
/* ── SUPER ADMIN ── */
.sa-badge{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.station-row{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:10px}
.station-row-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.plan-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.plan-trial{background:rgba(234,179,8,.2);color:#fbbf24}
.plan-basic{background:rgba(59,130,246,.2);color:#93c5fd}
.plan-pro{background:rgba(34,197,94,.2);color:#4ade80}
.plan-enterprise{background:rgba(249,115,22,.2);color:#fdba74}
.active-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px}
.inactive-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;margin-right:4px}
/* ── MISC ── */
.section-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fab{position:fixed;bottom:76px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(249,115,22,.4);z-index:90}
input,select,textarea{font-family:inherit}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:500;z-index:999;transition:.3s;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:#fca5a5}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">⛽</div>
      <h1>FuelBunk Pro</h1>
      <p>Multi-Station Management Platform</p>
    </div>
    <div id="authAlert" class="alert"></div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
      <button class="tab-btn" onclick="switchAuthTab('register')">Register Station</button>
      <button class="tab-btn" onclick="switchAuthTab('super')">Super Admin</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label>Station Code</label>
        <input id="loginStation" type="text" placeholder="e.g. DEMO01" autocomplete="off" style="text-transform:uppercase"/>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input id="loginUser" type="text" placeholder="Username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Login →</button>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="hidden">
      <div class="form-group">
        <label>Station Code <span style="color:var(--muted);font-size:10px">(4-10 chars, A-Z 0-9)</span></label>
        <input id="regCode" type="text" placeholder="e.g. HPCL001" style="text-transform:uppercase" maxlength="10"/>
      </div>
      <div class="form-group">
        <label>Station Name</label>
        <input id="regName" type="text" placeholder="e.g. Sharma Filling Station"/>
      </div>
      <div class="form-group">
        <label>Owner Username</label>
        <input id="regUser" type="text" placeholder="Min 4 characters"/>
      </div>
      <div class="form-group">
        <label>Owner Password <span style="color:var(--muted);font-size:10px">(Upper+Lower+Number+Special)</span></label>
        <input id="regPass" type="password" placeholder="Min 8 chars"/>
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input id="regFullName" type="text" placeholder="Owner's full name"/>
      </div>
      <div class="form-group">
        <label>Mobile</label>
        <input id="regMobile" type="tel" placeholder="10-digit mobile"/>
      </div>
      <button class="btn btn-secondary" onclick="doRegister()">Register & Start Free Trial →</button>
      <p style="text-align:center;color:var(--muted);font-size:12px;margin-top:12px">✓ 30-day free trial • No credit card needed</p>
    </div>

    <!-- Super Admin Form -->
    <div id="superForm" class="hidden">
      <div style="background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:#c4b5fd">
        🛡️ Super Admin access — manages all stations
      </div>
      <div class="form-group">
        <label>Username</label>
        <input id="saUser" type="text" placeholder="superadmin"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="saPass" type="password" placeholder="Password"/>
      </div>
      <button class="btn btn-outline" style="border-color:#7c3aed;color:#c4b5fd" onclick="doSuperLogin()">Super Admin Login →</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="idle-bar"><div class="idle-progress" id="idleBar"></div></div>
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:20px">⛽</span>
      <span class="topbar-logo">FuelBunk Pro</span>
      <span id="stationBadge" class="station-badge"></span>
    </div>
    <div class="topbar-right">
      <span id="userBadge" style="font-size:12px;color:var(--muted)"></span>
      <button onclick="doLogout()" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:20px">⏻</button>
    </div>
  </div>
  <div class="main-content" id="mainContent"></div>
  <nav class="bottom-nav" id="bottomNav">
    <button class="nav-item active" onclick="navigate('dashboard')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </button>
    <button class="nav-item" onclick="navigate('sale')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Quick Sale
    </button>
    <button class="nav-item" onclick="navigate('shifts')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Shifts
    </button>
    <button class="nav-item" onclick="navigate('stock')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Stock
    </button>
    <button class="nav-item" onclick="navigate('more')">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      More
    </button>
  </nav>
</div>

<!-- SUPER ADMIN PANEL -->
<div id="superApp" style="display:none;flex-direction:column;min-height:100vh">
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:20px">🛡️</span>
      <span class="topbar-logo">FuelBunk Pro</span>
      <span class="sa-badge">SUPER ADMIN</span>
    </div>
    <div class="topbar-right">
      <button onclick="doLogout()" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:20px">⏻</button>
    </div>
  </div>
  <div style="padding:16px;max-width:900px;margin:0 auto;width:100%" id="superContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let accessToken = '', refreshToken = '', currentUser = null, currentStation = null, isSuperAdmin = false;
let currentTab = 'dashboard';
let idleTimer = null, idleTimeout = 15 * 60, idleRemaining = idleTimeout;
let currentFuel = 'MS', currentPayMode = 'cash', entryMode = 'amount', entryValue = '';
let shiftId = null, nozzles = [], tanks = [], customers = [];

// ── Init ──────────────────────────────────────────────────────────────────
window.onload = async () => {
  const t = sessionStorage.getItem('access_token');
  const r = sessionStorage.getItem('refresh_token');
  const sa = sessionStorage.getItem('is_super_admin');
  if (t) {
    accessToken = t; refreshToken = r;
    if (sa === 'true') { isSuperAdmin = true; await resumeSuperAdmin(); }
    else await resumeSession();
  }
};

async function apiFetch(path, opts = {}) {
  opts.headers = { 'Content-Type': 'application/json', ...(accessToken ? { Authorization: `Bearer ${accessToken}` } : {}), ...opts.headers };
  if (opts.body && typeof opts.body !== 'string') opts.body = JSON.stringify(opts.body);
  let res = await fetch(API + path, opts);
  if (res.status === 401 && refreshToken) {
    const r2 = await fetch(API + '/api/auth/refresh', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ refreshToken }) });
    if (r2.ok) {
      const d = await r2.json();
      accessToken = d.accessToken;
      sessionStorage.setItem('access_token', accessToken);
      opts.headers.Authorization = `Bearer ${accessToken}`;
      res = await fetch(API + path, opts);
    } else { doLogout(); throw new Error('Session expired'); }
  }
  return res;
}

// ── Auth ──────────────────────────────────────────────────────────────────
function switchAuthTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['login','register','super'][i] === tab));
  ['loginForm','registerForm','superForm'].forEach((id,i) => document.getElementById(id).classList.toggle('hidden', ['login','register','super'][i] !== tab));
  document.getElementById('authAlert').className = 'alert';
}

function showAuthAlert(msg, type='error') {
  const el = document.getElementById('authAlert');
  el.textContent = msg; el.className = `alert ${type}`;
}

async function doLogin() {
  const station = document.getElementById('loginStation').value.trim().toUpperCase();
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!station || !username || !password) return showAuthAlert('Please fill all fields.');
  try {
    const res = await fetch(API + '/api/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ stationCode: station, username, password }) });
    const data = await res.json();
    if (!res.ok) return showAuthAlert(data.error || 'Login failed.');
    accessToken = data.accessToken; refreshToken = data.refreshToken;
    currentUser = data.user; currentStation = data.station; isSuperAdmin = false;
    sessionStorage.setItem('access_token', accessToken);
    sessionStorage.setItem('refresh_token', refreshToken);
    sessionStorage.setItem('is_super_admin', 'false');
    showApp();
  } catch(e) { showAuthAlert('Connection error.'); }
}

async function doRegister() {
  const stationCode = document.getElementById('regCode').value.trim().toUpperCase();
  const stationName = document.getElementById('regName').value.trim();
  const ownerUsername = document.getElementById('regUser').value.trim();
  const ownerPassword = document.getElementById('regPass').value;
  const ownerFullName = document.getElementById('regFullName').value.trim();
  const mobile = document.getElementById('regMobile').value.trim();
  if (!stationCode || !stationName || !ownerUsername || !ownerPassword || !ownerFullName) return showAuthAlert('Please fill all required fields.');
  try {
    const res = await fetch(API + '/api/auth/register', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ stationCode, stationName, ownerUsername, ownerPassword, ownerFullName, mobile }) });
    const data = await res.json();
    if (!res.ok) return showAuthAlert(data.error || (data.errors?.[0]?.msg) || 'Registration failed.');
    showAuthAlert(`✓ Station ${stationCode} registered! Login with your credentials.`, 'success');
    setTimeout(() => { document.getElementById('loginStation').value = stationCode; document.getElementById('loginUser').value = ownerUsername; switchAuthTab('login'); }, 2000);
  } catch(e) { showAuthAlert('Connection error.'); }
}

async function doSuperLogin() {
  const username = document.getElementById('saUser').value.trim();
  const password = document.getElementById('saPass').value;
  if (!username || !password) return showAuthAlert('Please fill all fields.');
  try {
    const res = await fetch(API + '/api/auth/super/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ username, password }) });
    const data = await res.json();
    if (!res.ok) return showAuthAlert(data.error || 'Login failed.');
    accessToken = data.accessToken; refreshToken = data.refreshToken; isSuperAdmin = true;
    sessionStorage.setItem('access_token', accessToken);
    sessionStorage.setItem('refresh_token', refreshToken);
    sessionStorage.setItem('is_super_admin', 'true');
    currentUser = data.user;
    showSuperAdmin();
  } catch(e) { showAuthAlert('Connection error.'); }
}

async function resumeSession() {
  try {
    const res = await apiFetch('/api/auth/me');
    if (!res.ok) { sessionStorage.clear(); return; }
    const data = await res.json();
    currentUser = data.user; currentStation = data.station;
    showApp();
  } catch { sessionStorage.clear(); }
}

async function resumeSuperAdmin() {
  try {
    const res = await apiFetch('/api/auth/me');
    if (!res.ok) { sessionStorage.clear(); return; }
    currentUser = (await res.json()).user;
    showSuperAdmin();
  } catch { sessionStorage.clear(); }
}

function doLogout() {
  if (refreshToken) apiFetch('/api/auth/logout', { method: 'POST', body: JSON.stringify({ refreshToken }) }).catch(() => {});
  sessionStorage.clear();
  accessToken = ''; refreshToken = ''; currentUser = null; currentStation = null; isSuperAdmin = false;
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('superApp').style.display = 'none';
  clearInterval(idleTimer);
}

// ── App Init ──────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('superApp').style.display = 'none';
  document.getElementById('stationBadge').textContent = currentStation?.code || '';
  document.getElementById('userBadge').textContent = `${currentUser?.role?.toUpperCase()} · ${currentUser?.username}`;
  idleTimeout = (currentStation?.idleTimeout || 15) * 60;
  startIdleTimer();
  navigate('dashboard');
}

function showSuperAdmin() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('superApp').style.display = 'flex';
  renderSuperDashboard();
}

// ── Idle Timer ────────────────────────────────────────────────────────────
function startIdleTimer() {
  idleRemaining = idleTimeout;
  clearInterval(idleTimer);
  idleTimer = setInterval(() => {
    idleRemaining--;
    document.getElementById('idleBar').style.width = (idleRemaining/idleTimeout*100) + '%';
    if (idleRemaining <= 0) { showToast('Session expired due to inactivity.','error'); doLogout(); }
  }, 1000);
  ['touchstart','click','keydown','mousemove'].forEach(e => document.addEventListener(e, resetIdle, { passive: true }));
}
function resetIdle() { idleRemaining = idleTimeout; }

// ── Navigation ────────────────────────────────────────────────────────────
function navigate(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach((b,i) => b.classList.toggle('active', ['dashboard','sale','shifts','stock','more'][i] === tab));
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class="spinner"></div>';
  ({ dashboard: renderDashboard, sale: renderSale, shifts: renderShifts, stock: renderStock, more: renderMore }[tab] || renderDashboard)();
}

function fmtINR(n) { return Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:0}); }

// ── Quick Sale ─────────────────────────────────────────────────────────────
async function renderSale() {
  const [nRes, cRes] = await Promise.all([apiFetch('/api/tanks'), apiFetch('/api/customers')]);
  tanks = (await nRes.json()).data || [];
  customers = (await cRes.json()).data || [];
  if (!shiftId) {
    const s = await apiFetch('/api/shifts/current');
    shiftId = (await s.json()).data?.id || null;
  }
  entryValue = ''; currentFuel = 'MS'; currentPayMode = 'cash'; entryMode = 'amount';
  renderSaleUI();
}

function renderSaleUI() {
  const prices = { MS: currentStation?.msPrice||102, HSD: currentStation?.hsdPrice||90, CNG: currentStation?.cngPrice||85 };
  const price = prices[currentFuel] || 100;
  const qty = entryMode==='litres' ? parseFloat(entryValue||0) : parseFloat(entryValue||0)/price;
  const amt = entryMode==='amount' ? parseFloat(entryValue||0) : qty*price;
  document.getElementById('mainContent').innerHTML = `
    <div class="card-title">Select Fuel</div>
    <div class="fuel-grid">
      ${['MS','HSD','CNG'].map(f=>`<button class="fuel-btn ${currentFuel===f?'selected':''}" onclick="selectFuel('${f}')"><div style="font-size:18px">${f==='MS'?'🟢':f==='HSD'?'🔵':'🟠'}</div><div>${f}</div><div class="fuel-price">₹${prices[f]}/L</div></button>`).join('')}
    </div>
    <div class="mode-toggle">
      <button class="mode-btn ${entryMode==='amount'?'active':''}" onclick="setMode('amount')">₹ Amount</button>
      <button class="mode-btn ${entryMode==='litres'?'active':''}" onclick="setMode('litres')">⛽ Litres</button>
    </div>
    <div class="amount-display">
      <div class="rupee">${entryMode==='amount'?'₹'+entryValue : '⛽'+entryValue}</div>
      <div class="litres">${entryMode==='amount'?`≈ ${qty.toFixed(2)}L` : `≈ ₹${amt.toFixed(2)}`}</div>
    </div>
    <div class="keypad">
      ${['1','2','3','4','5','6','7','8','9','.','0','⌫'].map((k,i)=>`<button class="key ${k==='0'?'':''} ${k==='⌫'?'key-del':''}" onclick="keyPress('${k}')">${k}</button>`).join('')}
    </div>
    <div class="card-title">Payment Mode</div>
    <div class="pay-grid">
      ${['cash','phonepe','gpay','paytm','card','credit'].map(p=>`<button class="pay-btn ${currentPayMode===p?'selected':''}" onclick="selectPay('${p}')">${{cash:'💵 Cash',phonepe:'📱 PhonePe',gpay:'🟢 GPay',paytm:'🔵 Paytm',card:'💳 Card',credit:'📋 Credit'}[p]}</button>`).join('')}
    </div>
    ${currentPayMode==='credit'?`<div class="form-group"><label>Customer</label><select id="creditCust"><option value="">-- Select --</option>${customers.map(c=>`<option value="${c.id}">${c.company_name} (₹${c.outstanding} due)</option>`).join('')}</select></div>`:''}
    <button class="btn btn-primary" onclick="submitSale(${price},${qty.toFixed(4)},${amt.toFixed(2)})" style="margin-top:8px" ${!shiftId?'disabled title="Open a shift first"':''}>
      ${!shiftId?'⚠️ Open Shift First':'Record Sale ₹'+amt.toFixed(2)}
    </button>`;
}

function selectFuel(f) { currentFuel = f; entryValue = ''; renderSaleUI(); }
function selectPay(p) { currentPayMode = p; renderSaleUI(); }
function setMode(m) { entryMode = m; entryValue = ''; renderSaleUI(); }
function keyPress(k) {
  if (k==='⌫') { entryValue = entryValue.slice(0,-1); }
  else if (k==='.' && entryValue.includes('.')) return;
  else if (entryValue.length >= 8) return;
  else entryValue += k;
  renderSaleUI();
}

async function submitSale(rate, quantity, amount) {
  if (!entryValue || parseFloat(entryValue)<=0) return showToast('Enter amount or litres','error');
  if (!shiftId) return showToast('Open a shift first','error');
  const custId = currentPayMode==='credit' ? document.getElementById('creditCust')?.value : null;
  const body = { fuelType: currentFuel, quantity, rate, amount, paymentMode: currentPayMode, shiftId, customerId: custId||undefined };
  try {
    const res = await apiFetch('/api/sales', { method: 'POST', body });
    const data = await res.json();
    if (!res.ok) return showToast(data.error || data.errors?.[0]?.msg || 'Error','error');
    showToast(`✓ Sale ₹${amount.toFixed(2)} recorded — ${data.invoiceNo}`,'success');
    entryValue = ''; renderSaleUI();
  } catch { showToast('Network error','error'); }
}

async function openShift() {
  const name = document.getElementById('shiftName')?.value || 'Day Shift';
  const res = await apiFetch('/api/shifts/open', { method: 'POST', body: { shiftName: name } });
  const data = await res.json();
  if (!res.ok) return showToast(data.error,'error');
  shiftId = data.shiftId;
  showToast('✓ Shift opened','success');
  renderShifts();
}

async function closeShift(id) {
  const cash = parseFloat(document.getElementById('physCash')?.value||0);
  const res = await apiFetch(`/api/shifts/${id}/close`, { method: 'PUT', body: { cashPhysical: cash } });
  const data = await res.json();
  if (!res.ok) return showToast(data.error,'error');
  shiftId = null;
  showToast(`✓ Shift closed. Variance: ₹${data.variance}`,'success');
  renderShifts();
}

async function exportDailyPDF(dateStr) {
  const today = dateStr || new Date().toISOString().slice(0,10);
  showToast('Generating PDF...', 'success');
  const res = await apiFetch(`/api/reports/daily?date=${today}`);
  const { data } = await res.json();
  const sRes = await apiFetch('/api/settings');
  const station = (await sRes.json()).data;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

  // Header
  doc.setFillColor(249,115,22);
  doc.rect(0,0,210,22,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('FuelBunk Pro — Daily Sales Report', 14, 14);

  doc.setFillColor(26,31,46);
  doc.rect(0,22,210,14,'F');
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text(`Station: ${station?.station_name||''}  |  Date: ${today}  |  GSTIN: ${station?.gstin||'N/A'}`, 14, 31);

  let y = 44;
  doc.setTextColor(30,30,30);

  // Fuel wise
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('Fuel-Wise Summary', 14, y); y+=6;
  doc.autoTable({ startY:y, head:[['Fuel','Transactions','Quantity (L)','Revenue (₹)']], body:(data.fuelWise||[]).map(f=>[f.fuel_type,f.txns,(f.qty||0).toFixed(2),'₹'+fmtINR(f.amount)]), foot:[['TOTAL',(data.fuelWise||[]).reduce((a,b)=>a+b.txns,0),(data.fuelWise||[]).reduce((a,b)=>a+(b.qty||0),0).toFixed(2),'₹'+fmtINR((data.fuelWise||[]).reduce((a,b)=>a+(b.amount||0),0))]], styles:{fontSize:9,cellPadding:3}, headStyles:{fillColor:[249,115,22],textColor:255,fontStyle:'bold'}, footStyles:{fillColor:[240,240,240],fontStyle:'bold'}, alternateRowStyles:{fillColor:[248,248,248]} });

  y = doc.lastAutoTable.finalY + 10;
  doc.setFont('helvetica','bold');
  doc.text('Payment-Wise Summary', 14, y); y+=6;
  doc.autoTable({ startY:y, head:[['Payment Mode','Transactions','Amount (₹)']], body:(data.paymentWise||[]).map(p=>[p.payment_mode.toUpperCase(),p.txns,'₹'+fmtINR(p.amount)]), foot:[['TOTAL',(data.paymentWise||[]).reduce((a,b)=>a+b.txns,0),'₹'+fmtINR((data.paymentWise||[]).reduce((a,b)=>a+(b.amount||0),0))]], styles:{fontSize:9,cellPadding:3}, headStyles:{fillColor:[59,130,246],textColor:255,fontStyle:'bold'}, footStyles:{fillColor:[240,240,240],fontStyle:'bold'}, alternateRowStyles:{fillColor:[248,248,248]} });

  if (data.shiftWise?.length) {
    y = doc.lastAutoTable.finalY + 10;
    doc.setFont('helvetica','bold');
    doc.text('Shift-Wise Summary', 14, y); y+=6;
    doc.autoTable({ startY:y, head:[['Shift','Total Sales','Cash','UPI','Credit','Variance']], body:data.shiftWise.map(s=>[s.shift_name,'₹'+fmtINR(s.total_sales),'₹'+fmtINR(s.cash_collected),'₹'+fmtINR(s.upi_collected),'₹'+fmtINR(s.credit_sales),(s.cash_variance!=null?(s.cash_variance>=0?'+':'')+fmtINR(s.cash_variance):'N/A')]), styles:{fontSize:9,cellPadding:3}, headStyles:{fillColor:[34,197,94],textColor:255,fontStyle:'bold'}, alternateRowStyles:{fillColor:[248,248,248]} });
  }

  // Footer
  const pageCount = doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++) {
    doc.setPage(i);
    doc.setFontSize(8); doc.setTextColor(150);
    doc.text(`Generated by FuelBunk Pro on ${new Date().toLocaleString('en-IN')} | Page ${i} of ${pageCount}`, 14, 290);
  }

  doc.save(`DailyReport_${today}.pdf`);
  showToast('✓ PDF downloaded!', 'success');
}

    <div id="outContent"><div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div></div>`;
  const res = await apiFetch('/api/reports/outstanding');
  const data = (await res.json()).data || [];
  const total = data.reduce((a,b)=>a+(b.outstanding||0),0);
  document.getElementById('outContent').innerHTML = `
    <div class="stat-grid" style="gap:10px;margin-bottom:12px">
      <div class="stat-card"><div class="stat-value" style="color:var(--red)">₹${fmtINR(total)}</div><div class="stat-label">Total Outstanding</div></div>
      <div class="stat-card"><div class="stat-value">${data.length}</div><div class="stat-label">Customers</div></div>
    </div>
    ${data.length ? data.map((c,i)=>`
      <div class="list-item" style="border-left:3px solid ${c.outstanding>c.credit_limit?'var(--red)':'var(--yellow)'}">
        <div style="width:32px;height:32px;background:var(--surface);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;margin-right:10px;color:var(--accent)">${i+1}</div>
        <div class="list-item-left">
          <div class="list-item-title">${c.company_name}</div>
          <div class="list-item-sub">${c.contact_name||''} ${c.mobile?'· '+c.mobile:''}</div>
          <div style="font-size:11px;margin-top:2px">
            <span style="color:var(--muted)">Limit: ₹${fmtINR(c.credit_limit)}</span>
            ${c.outstanding>c.credit_limit?'<span style="color:var(--red);margin-left:6px;font-weight:700">⚠️ OVER LIMIT</span>':''}
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:700;font-size:16px;color:var(--red)">₹${fmtINR(c.outstanding)}</div>
          <div style="font-size:11px;color:var(--muted)">${Math.round((c.outstanding/c.credit_limit)*100)}% used</div>
        </div>
      </div>`).join('') : '<div class="card"><div style="text-align:center;padding:32px;color:var(--green)">✅ No outstanding dues</div></div>'}`;
}

async function exportOutstandingPDF() {
  showToast('Generating PDF...','success');
  const res = await apiFetch('/api/reports/outstanding');
  const data = (await res.json()).data || [];
  const sRes = await apiFetch('/api/settings');
  const station = (await sRes.json()).data;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFillColor(239,68,68); doc.rect(0,0,210,22,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('FuelBunk Pro — Outstanding Credit Report', 14, 14);
  doc.setFillColor(26,31,46); doc.rect(0,22,210,14,'F');
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text(`Station: ${station?.station_name||''}  |  Generated: ${new Date().toLocaleDateString('en-IN')}`, 14, 31);
  doc.setTextColor(30,30,30);
  doc.autoTable({ startY:44, head:[['#','Company','Contact','Mobile','Credit Limit','Outstanding','Status']], body:data.map((c,i)=>[i+1,c.company_name,c.contact_name||'',c.mobile||'','₹'+fmtINR(c.credit_limit),'₹'+fmtINR(c.outstanding),c.outstanding>c.credit_limit?'OVER LIMIT':'OK']), foot:[['','','','','TOTAL','₹'+fmtINR(data.reduce((a,b)=>a+(b.outstanding||0),0)),'']], styles:{fontSize:8,cellPadding:3}, headStyles:{fillColor:[239,68,68],textColor:255,fontStyle:'bold'}, footStyles:{fillColor:[240,240,240],fontStyle:'bold'}, alternateRowStyles:{fillColor:[248,248,248]}, didParseCell:(d)=>{ if(d.section==='body'&&d.column.index===6&&d.cell.raw==='OVER LIMIT') d.cell.styles.textColor=[239,68,68]; } });
  doc.setFontSize(8); doc.setTextColor(150);
  doc.text(`Generated by FuelBunk Pro on ${new Date().toLocaleString('en-IN')}`, 14, 290);
  doc.save(`Outstanding_Report_${new Date().toISOString().slice(0,10)}.pdf`);
  showToast('✓ PDF downloaded!','success');
}

async function showSettings() {
  const res = await apiFetch('/api/settings');
  const s = (await res.json()).data;
  document.getElementById('mainContent').innerHTML = `
    <button onclick="renderMore()" style="background:transparent;border:none;color:var(--accent);cursor:pointer;margin-bottom:12px">← Back</button>
    <div class="section-title">Station Settings</div>
    <div class="card">
      <div class="form-group"><label>Station Name</label><input id="sName" value="${s.station_name||''}"/></div>
      <div class="form-group"><label>MS Price (₹/L)</label><input id="sMS" type="number" value="${s.ms_price||102}"/></div>
      <div class="form-group"><label>HSD Price (₹/L)</label><input id="sHSD" type="number" value="${s.hsd_price||90}"/></div>
      <div class="form-group"><label>CNG Price (₹/L)</label><input id="sCNG" type="number" value="${s.cng_price||85}"/></div>
      <div class="form-group"><label>Idle Timeout (minutes)</label><input id="sIdle" type="number" value="${s.idle_timeout||15}"/></div>
      <div class="form-group"><label>GSTIN</label><input id="sGST" value="${s.gstin||''}"/></div>
      <div class="form-group"><label>Mobile</label><input id="sMob" value="${s.mobile||''}"/></div>
      <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
    </div>`;
}

async function saveSettings() {
  const body={stationName:document.getElementById('sName').value,msPrice:parseFloat(document.getElementById('sMS').value),hsdPrice:parseFloat(document.getElementById('sHSD').value),cngPrice:parseFloat(document.getElementById('sCNG').value),idleTimeout:parseInt(document.getElementById('sIdle').value),gstin:document.getElementById('sGST').value,mobile:document.getElementById('sMob').value};
  const res=await apiFetch('/api/settings',{method:'PUT',body});
  const data=await res.json();
  if(!res.ok) return showToast(data.error,'error');
  if(currentStation){currentStation.msPrice=body.msPrice;currentStation.hsdPrice=body.hsdPrice;currentStation.cngPrice=body.cngPrice;}
  showToast('✓ Settings saved','success');
}

async function showAuditLog() {
  const res = await apiFetch('/api/settings/audit');
  const logs = (await res.json()).data || [];
  document.getElementById('mainContent').innerHTML = `
    <button onclick="renderMore()" style="background:transparent;border:none;color:var(--accent);cursor:pointer;margin-bottom:12px">← Back</button>
    <div class="section-title">Audit Log</div>
    ${logs.map(l=>`<div class="list-item"><div class="list-item-left"><div class="list-item-title">${l.action} · ${l.resource||''}</div><div class="list-item-sub">${l.username} · ${new Date(l.created_at).toLocaleString('en-IN')}</div></div><div class="badge ${l.status==='success'?'badge-ms':'badge-credit'}">${l.status}</div></div>`).join('') || '<div class="empty">No audit records</div>'}`;
}

// ── Super Admin ────────────────────────────────────────────────────────────
async function renderSuperDashboard() {
  const [statsRes, stationsRes] = await Promise.all([apiFetch('/api/super/stats'), apiFetch('/api/super/stations')]);
  const stats = (await statsRes.json()).data;
  const stations = (await stationsRes.json()).data || [];
  document.getElementById('superContent').innerHTML = `
    <div class="section-title">Platform Overview</div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value">${stats.totalStations}</div><div class="stat-label">Total Stations</div></div>
      <div class="stat-card"><div class="stat-value">${stats.activeStations}</div><div class="stat-label">Active</div></div>
      <div class="stat-card"><div class="stat-value">₹${(stats.todayRevenue||0).toLocaleString('en-IN',{maximumFractionDigits:0})}</div><div class="stat-label">Today's Revenue</div></div>
      <div class="stat-card"><div class="stat-value">${stats.totalUsers}</div><div class="stat-label">Total Users</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px">
      <div class="section-title" style="margin:0">All Stations</div>
      <button onclick="showAddStation()" style="background:var(--accent);border:none;color:#fff;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600">+ New Station</button>
    </div>
    ${stations.map(s=>`<div class="station-row">
      <div class="station-row-header">
        <div><span ${s.is_active?'class="active-dot"':'class="inactive-dot"'}></span><strong>${s.station_code}</strong> — ${s.station_name}</div>
        <span class="plan-badge plan-${s.plan}">${s.plan.toUpperCase()}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:12px;color:var(--muted);margin-bottom:10px">
        <div>👥 ${s.user_count} users</div>
        <div>🛒 ${s.today_sales} sales today</div>
        <div>₹${(s.today_revenue||0).toLocaleString('en-IN',{maximumFractionDigits:0})} today</div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="toggleStation(${s.id},${s.is_active?0:1})" style="flex:1;padding:8px;border:1px solid var(--border);background:transparent;color:${s.is_active?'var(--red)':'var(--green)'};border-radius:8px;cursor:pointer;font-size:12px">${s.is_active?'Suspend':'Activate'}</button>
        <button onclick="changePlan(${s.id},'${s.plan}')" style="flex:1;padding:8px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:8px;cursor:pointer;font-size:12px">Change Plan</button>
      </div>
    </div>`).join('') || '<div class="empty">No stations yet</div>'}`;
}

function showAddStation() {
  document.getElementById('superContent').innerHTML = `
    <button onclick="renderSuperDashboard()" style="background:transparent;border:none;color:var(--accent);cursor:pointer;margin-bottom:12px">← Back</button>
    <div class="section-title">Add New Station</div>
    <div class="card">
      <div class="form-group"><label>Station Code</label><input id="nsCode" placeholder="e.g. BPCL001" style="text-transform:uppercase"/></div>
      <div class="form-group"><label>Station Name</label><input id="nsName" placeholder="Station name"/></div>
      <div class="form-group"><label>Owner Username</label><input id="nsUser" placeholder="Min 4 chars"/></div>
      <div class="form-group"><label>Owner Password</label><input id="nsPass" type="password" placeholder="Upper+Lower+Number+Special"/></div>
      <div class="form-group"><label>Owner Full Name</label><input id="nsFull" placeholder="Full name"/></div>
      <div class="form-group"><label>Plan</label><select id="nsPlan"><option value="trial">Trial</option><option value="basic">Basic</option><option value="pro">Pro</option><option value="enterprise">Enterprise</option></select></div>
      <button class="btn btn-primary" onclick="createStation()">Create Station</button>
    </div>`;
}

async function createStation() {
  const body={stationCode:document.getElementById('nsCode').value.trim().toUpperCase(),stationName:document.getElementById('nsName').value.trim(),ownerUsername:document.getElementById('nsUser').value.trim(),ownerPassword:document.getElementById('nsPass').value,ownerFullName:document.getElementById('nsFull').value.trim(),plan:document.getElementById('nsPlan').value};
  const res=await apiFetch('/api/super/stations',{method:'POST',body});
  const data=await res.json();
  if(!res.ok) return showToast(data.error||data.errors?.[0]?.msg||'Error','error');
  showToast('✓ Station created','success');
  renderSuperDashboard();
}

async function toggleStation(id, active) {
  await apiFetch(`/api/super/stations/${id}`, {method:'PUT', body:{isActive:active}});
  showToast(active?'✓ Station activated':'Station suspended','success');
  renderSuperDashboard();
}

async function changePlan(id, currentPlan) {
  const plans = ['trial','basic','pro','enterprise'];
  const next = plans[(plans.indexOf(currentPlan)+1)%plans.length];
  await apiFetch(`/api/super/stations/${id}`, {method:'PUT', body:{plan:next}});
  showToast(`✓ Plan changed to ${next}`,'success');
  renderSuperDashboard();
}

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
